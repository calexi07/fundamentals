name: Build menu data

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

jobs:
  build-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate menu-data.json
        run: python scripts/generate_menu_data.py

      - name: Commit menu-data.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add menu-data.json
          if git diff --cached --quiet; then
            echo "No changes to menu-data.json"
          else
            git commit -m "Auto-update menu-data.json"
            git push
          fi
